<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Experience - Travel App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
        }
        :root {
            --primary-color: #007bff;
        }
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .instance-form {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .remove-instance {
            color: #dc3545;
            cursor: pointer;
        }
        .remove-instance:hover {
            color: #c82333;
        }
    </style>
</head>
<body>

<div class="d-flex justify-content-between align-items-center p-3 bg-white shadow-sm mb-4">
    <h1 class="h4 font-weight-bold mb-0">Create New Experience</h1>
    <a th:href="@{'/user/guide/' + ${user.username}}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
    </a>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-body">
                    <form th:action="@{'/user/guide/' + ${user.username} + '/create-experience'}" method="post" th:object="${experience}">
                        <input type="hidden" name="userId" th:value="${user.id}">
                        
                        <div class="row mb-4">
                            <div class="col-12">
                                <h5 class="text-primary mb-3">
                                    <i class="bi bi-info-circle me-2"></i>Basic Information
                                </h5>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="title" class="form-label">Experience Title*</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" 
                                       placeholder="Enter a catchy title for your experience" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="shortDescription" class="form-label">Short Description*</label>
                                <input type="text" class="form-control" id="shortDescription" th:field="*{shortDescription}" 
                                       placeholder="Brief description (max 100 characters)" maxlength="100" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="description" class="form-label">Full Description*</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="4" 
                                          placeholder="Provide a detailed description of your experience" required></textarea>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-12">
                                <h5 class="text-primary mb-3">
                                    <i class="bi bi-geo-alt me-2"></i>Location Details
                                </h5>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="country" class="form-label">Country*</label>
                                <input type="text" class="form-control" id="country" th:field="*{country}" 
                                       placeholder="e.g., Canada" required>
                            </div>
                            <div class="col-md-6">
                                <label for="city" class="form-label">City*</label>
                                <input type="text" class="form-control" id="city" th:field="*{city}" 
                                       placeholder="e.g., Vancouver" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="location" class="form-label">Specific Location*</label>
                                <input type="text" class="form-control" id="location" th:field="*{location}" 
                                       placeholder="e.g., English Bay Beach, Vancouver, BC" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-12">
                                <h5 class="text-primary mb-3">
                                    <i class="bi bi-gear me-2"></i>Experience Details
                                </h5>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="maxParticipants" class="form-label">Max Participants*</label>
                                <input type="number" class="form-control" id="maxParticipants" th:field="*{maxParticipants}" 
                                       min="1" max="100" placeholder="10" required>
                            </div>
                            <div class="col-md-4">
                                <label for="duration" class="form-label">Duration (hours)*</label>
                                <input type="number" class="form-control" id="duration" th:field="*{duration}" 
                                       min="1" max="24" step="0.5" placeholder="2" required>
                            </div>
                            <div class="col-md-4">
                                <label for="price" class="form-label">Base Price ($)*</label>
                                <input type="number" class="form-control" id="price" th:field="*{price}" 
                                       min="0" step="0.01" placeholder="25.00" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-12">
                                <h5 class="text-primary mb-3">
                                    <i class="bi bi-calendar-event me-2"></i>Schedule Instances
                                </h5>
                                <p class="text-muted small">Add specific dates and times when this experience will be available.</p>
                            </div>
                        </div>

                        <div id="instances-container">
                            <div class="instance-form" data-instance="0">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="mb-0">Instance #1</h6>
                                </div>
                                
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Start Date & Time*</label>
                                        <input type="datetime-local" class="form-control" 
                                               name="instances[0].startDateTime" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">End Date & Time*</label>
                                        <input type="datetime-local" class="form-control" 
                                               name="instances[0].endDateTime" required>
                                    </div>
                                </div>
                                
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Available Slots*</label>
                                        <input type="number" class="form-control" 
                                               name="instances[0].availableSlots" min="1" max="100" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Price Override ($)</label>
                                        <input type="number" class="form-control" 
                                               name="instances[0].price" min="0" step="0.01" 
                                               placeholder="Leave empty to use base price">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-12">
                                <button type="button" class="btn btn-outline-primary" id="add-instance">
                                    <i class="bi bi-plus-circle me-2"></i>Add Another Instance
                                </button>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12">
                                <hr class="mb-4">
                                <div class="d-flex justify-content-between">
                                    <a th:href="@{'/user/guide/' + ${username}}" class="btn btn-outline-secondary">
                                        <i class="bi bi-x-circle me-2"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-2"></i>Create Experience
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

<script>
    let instanceCounter = 1;

    document.getElementById('add-instance').addEventListener('click', function() {
        const container = document.getElementById('instances-container');
        const newInstance = document.createElement('div');
        newInstance.className = 'instance-form';
        newInstance.setAttribute('data-instance', instanceCounter);
        
        newInstance.innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0">Instance #${instanceCounter + 1}</h6>
                <span class="remove-instance" onclick="removeInstance(${instanceCounter})">
                    <i class="bi bi-trash"></i> Remove
                </span>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Start Date & Time*</label>
                    <input type="datetime-local" class="form-control" 
                           name="instances[${instanceCounter}].startDateTime" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">End Date & Time*</label>
                    <input type="datetime-local" class="form-control" 
                           name="instances[${instanceCounter}].endDateTime" required>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Available Slots*</label>
                    <input type="number" class="form-control" 
                           name="instances[${instanceCounter}].availableSlots" min="1" max="100" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Price Override ($)</label>
                    <input type="number" class="form-control" 
                           name="instances[${instanceCounter}].price" min="0" step="0.01" 
                           placeholder="Leave empty to use base price">
                </div>
            </div>
        `;
        
        container.appendChild(newInstance);
        instanceCounter++;
    });

    function removeInstance(instanceId) {
        const instance = document.querySelector(`[data-instance="${instanceId}"]`);
        if (instance) {
            instance.remove();
        }
    }

    document.addEventListener('change', function(e) {
        if (e.target.name && e.target.name.includes('startDateTime')) {
            const startInput = e.target;
            const instanceIndex = startInput.name.match(/\[(\d+)\]/)[1];
            const endInput = document.querySelector(`input[name="instances[${instanceIndex}].endDateTime"]`);
            const durationInput = document.getElementById('duration');
            
            if (startInput.value && durationInput.value) {
                const startDate = new Date(startInput.value);
                const duration = parseFloat(durationInput.value);
                const endDate = new Date(startDate.getTime() + (duration * 60 * 60 * 1000));
                
                const year = endDate.getFullYear();
                const month = String(endDate.getMonth() + 1).padStart(2, '0');
                const day = String(endDate.getDate()).padStart(2, '0');
                const hours = String(endDate.getHours()).padStart(2, '0');
                const minutes = String(endDate.getMinutes()).padStart(2, '0');
                
                endInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
            }
        }
    });

    document.getElementById('maxParticipants').addEventListener('change', function() {
        const maxParticipants = this.value;
        const slotInputs = document.querySelectorAll('input[name*="availableSlots"]');
        
        slotInputs.forEach(input => {
            if (!input.value) {
                input.value = maxParticipants;
            }
        });
    });
</script>

</body>
</html>
