<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Login</title>
    <meta charset="UTF-8">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .container {
            max-width: 400px;
            margin: 10% auto;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.3);
            color: #555;
        }

        input::placeholder {
            color: #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00b4d8;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0077b6;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
            text-align: center;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            color: #ade8f4;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        small {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #eee;
        }
        .role-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .role-toggle input[type="radio"] {
            display: none;
        }

        .role-toggle label {
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid #999;
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .role-toggle input[type="radio"]:checked + label {
            background-color: #999;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 10px #666;
            border-color: #999;
        }
    </style>
</head>
<body>


<div id="vanta-bg"></div>

<div class="container">
    <h2>Login</h2>
    <form action="/user/login" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <div class="role-toggle">
            <input type="radio" id="traveler" name="traveler" value=True required>
            <label for="traveler">Traveller</label>

            <input type="radio" id="guide" name="guide" value=True>
            <label for="guide">Guide</label>
        </div>

        <button type="submit">Login</button>
    </form>


    <div th:if="${param.error}" class="error">
        <p>Invalid token or credentials</p>
    </div>

    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>

    <div class="register-link">
        <p>Don't have an account? <a th:href="@{/user/register}">Register here</a></p>
    </div>

    <p><small>Test users: sora/sora123, kairi/kairi456, riku/riku789</small></p>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>

<script>
    // 初始化 VANTA
    document.addEventListener("DOMContentLoaded", function () {
        VANTA.CLOUDS({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            backgroundColor: 0xffffff,
            skyColor: 0x68b8d7,
            cloudColor: 0xadc1de,
            cloudShadowColor: 0x183550,
            sunColor: 0xff9919,
            sunlightColor: 0xff9933,
            speed: 1.2
        });
    });
</script>

</body>
</html>
