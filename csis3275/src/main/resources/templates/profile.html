<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center">
        <h2>User Profile</h2>
        <div>
            <a th:href="@{'/user/'  + ${session.sessionRole} + '/' + ${user.username}}" class="btn btn-secondary btn-sm">Home</a>
            <a th:href="@{'/user/logout/' + ${user.username}}" class="btn btn-danger btn-sm ml-2">Logout</a>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-body">
            <p><strong>Username:</strong> <span th:text="${user.username}">Username</span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}">Email</span></p>
            <p><strong>First Name:</strong> <span th:text="${user.firstName}">First Name</span></p>
            <p><strong>Last Name:</strong> <span th:text="${user.lastName}">Last Name</span></p>
            <p><strong>Phone:</strong> <span th:text="${user.phone}">Phone</span></p>
            <p><strong>Country:</strong> <span th:text="${user.country}">Country</span></p>
            <p><strong>Admin:</strong> <span th:text="${user.admin ? 'Yes' : 'No'}">No</span></p>
            <p><strong>Traveler:</strong> <span th:text="${user.traveler ? 'Yes' : 'No'}">No</span></p>
            <p><strong>Guide:</strong> <span th:text="${user.guide ? 'Yes' : 'No'}">No</span></p>
        </div>
    </div>

    <a th:href="@{'/user/update/' + ${user.username}}" class="btn btn-primary mt-3">Edit Profile</a>
</div>

</body>
</html>
