<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>User Registration</title>
  <link
          rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
  />
  <style>
    body {
      background-color: #f8f9fa;
    }
    .register-container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .form-check {
      margin-top: 10px;
    }
    .btn-group {
      margin-top: 20px;
    }
    .nav-links {
      margin-top: 25px;
      text-align: center;
    }
    .nav-links a {
      margin: 0 10px;
      color: #007bff;
      text-decoration: none;
    }
    .nav-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="register-container">
  <h2 class="mb-4 text-center">Register New User</h2>

  <form th:action="@{/user/register}" th:object="${registerUser}" method="post">
    <div class="form-group">
      <label for="username">Username</label>
      <input
              type="text"
              id="username"
              th:field="*{username}"
              class="form-control"
              required
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
              type="password"
              id="password"
              th:field="*{password}"
              class="form-control"
              required
      />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
              type="email"
              id="email"
              th:field="*{email}"
              class="form-control"
              required
      />
    </div>

    <div class="form-group">
      <label for="firstName">First Name</label>
      <input
              type="text"
              id="firstName"
              th:field="*{firstName}"
              class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input
              type="text"
              id="lastName"
              th:field="*{lastName}"
              class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="phone">Phone</label>
      <input
              type="text"
              id="phone"
              th:field="*{phone}"
              class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="country">Country</label>
      <input
              type="text"
              id="country"
              th:field="*{country}"
              class="form-control"
      />
    </div>


    <button type="submit" class="btn btn-primary btn-block mt-4">
      Register
    </button>
  </form>

  <div class="nav-links">
    <a th:href="@{/}">Back to Home</a> |
    <a th:href="@{/user/login}">Login</a>
  </div>
</div>

</body>
</html>
